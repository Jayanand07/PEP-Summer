<div class="max-w-7xl mx-auto px-6 py-10">
  <h1 class="text-4xl font-bold text-center mb-10">🎬 Now Playing Movies</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
    @for (item of moviesArr(); track item) {
      <div
        class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-300"
      >
        <img
          class="w-full h-[420px] object-cover"
          [src]="'https://image.tmdb.org/t/p/w500' + $any(item).poster_path"
          [alt]="$any(item).title"
        />

        <div class="p-5 space-y-2">
          <h2 class="text-lg font-bold line-clamp-1">
            {{ $any(item).title }}
          </h2>

          <div class="flex justify-between text-sm">
            <span class="text-yellow-500 font-semibold"> ⭐ {{ $any(item).vote_average }} </span>

            <span class="text-gray-500">
              {{ $any(item).release_date }}
            </span>
          </div>

          <p class="text-gray-600 text-sm line-clamp-4">
            {{ $any(item).overview }}
          </p>
        </div>
      </div>
    }
  </div>

  <div class="flex justify-center mt-10 flex-row gap-2">
    <app-button
      [isButtonDisabled]="currPage == 1"
      [buttonText]="'PREV'"
      (buttonFn)="fetchMovies(currPage > 1 ? currPage - 1 : currPage)"
      [buttonSize]="buttonConfig.sizes.SM"
      [buttonType]="buttonConfig.types.PRIMARY"
    >
    </app-button>

    <button (click)="fetchMovies(currPage + 1)">{{ currPage + 1 }}</button>
    <button (click)="fetchMovies(currPage + 2)">{{ currPage + 2 }}</button>
    <button (click)="fetchMovies(currPage + 3)">{{ currPage + 3 }}</button>
    <button (click)="fetchMovies(currPage + 4)">{{ currPage + 4 }}</button>

    <app-button
      [buttonText]="'NEXT'"
      (buttonFn)="fetchMovies(currPage + 1)"
      [buttonSize]="buttonConfig.sizes.SM"
      [buttonType]="buttonConfig.types.PRIMARY"
    >
    </app-button>
  </div>
</div>
