<div class="min-h-[720px] flex items-center justify-center bg-gray-100">
  <form
    [formGroup]="reactiveForm"
    class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg space-y-5"
  >
    <h2 class="text-2xl font-bold text-center text-gray-800">Registration Form</h2>

    <!-- Name -->
    <div>
      <input
        type="text"
        formControlName="name"
        placeholder="Enter your Name"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />

      @if (inValid('name')) {
        @if (f['name']?.errors?.['required']) {
          <p class="text-red-500 text-sm mt-1">Name is required</p>
        }

        @if (f['name']?.errors?.['minlength']) {
          <p class="text-red-500 text-sm mt-1">Name must be at least 3 characters long</p>
        }
      }
    </div>

    <!-- Email -->
    <div>
      <input
        type="email"
        formControlName="email"
        placeholder="Enter your Email"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>

    <!-- Phone -->
    <div>
      <input
        type="tel"
        formControlName="phone"
        placeholder="Enter your Phone Number"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>

    <!-- file input -->
    <div>
        <input
          type="file"
            accept="image/*"
            (change)="onFileSelect($event)"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />

        @if(imagePreview()){
            <img [src]="imagePreview()" alt="preview" />
        }
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-300"
    >
      Submit
    </button>
  </form>
</div>
