

<div class="text-6xl p-10">
  <nav class="flex gap-4 text-2xl p-2">
    <a routerLink="child">Child</a>
    <button routerLink="about">About</button>
    <button routerLink="contact">contact</button>
  </nav>

  

  

  

  <input type="text" class="border-2" (input)="onInput($event)" [value]="todoText" />
  <button (click)="addTodo()"  class="p-2 cursor-pointer">ADD TODO ✅</button>
  <div>
    @for (item of todoArr(); track $index) {
      <div class="flex flex-wrap gap-6 text-center border-solid border-2 m-2 p-2 justify-around">
        @if (item.isDone) {
          <p class="line-through text-red-500">{{ item.text }}</p>
        } @else {
          <p>{{ item.text }}</p>
        }

        <button class="cursor-pointer" (click)="toggleTodo(item.id)">↔</button>
        <button (click)="updateTodo(item.id)">✏️</button>

        <button class="cursor-pointer" (click)="deleteTodo(item.id, false)">❌️</button>
      </div>
    }
  </div>

  
</div>
